version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant-1.17.0
    restart: unless-stopped

    # ========== 新增这段配置 ==========
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # =================================

    ports:
      - "6333:6333"   # HTTP REST API
      - "6334:6334"   # gRPC API

    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO

    volumes:
      - ./qdrant_data:/qdrant/storage

    networks:
      - qdrant_net

networks:
  qdrant_net:
    driver: bridge