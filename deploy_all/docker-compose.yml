version: '3.5'

services:
  # --- 基准: Milvus (v2.6.7 - 最新稳定版) ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.23
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports: ["19000:9000", "19001:9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.6.7
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports: ["19531:19530", "19091:9091"]
    depends_on: ["etcd", "minio"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    
  attu:
    image: zilliz/attu:latest
    ports:
      - "3000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus

  # --- 挑战者 1: Qdrant (v1.16.2 - 最新稳定版) ---
  qdrant:
    image: qdrant/qdrant:v1.16.2
    ports: ["6333:6333", "6334:6334"]
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    # v1.16.2 修复了 WAL 关键 Bug 和共识/数据一致性问题

  # --- 挑战者 2: Weaviate (v1.34.5 - 最新稳定版) ---
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.5
    ports: ["8080:8080", "50051:50051"]
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none' # 纯向量模式，不加载 AI 模型
      ENABLE_MODULES: ''
    # v1.34.5 修复了 lazy segment 锁竞争和 tombstone 清理问题

  # --- 挑战者 3: Chroma (1.3.6 - 最新稳定版) ---
  chroma:
    image: chromadb/chroma:1.3.6
    ports: ["8000:8000"]
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    # 1.3.6 包含 BM25、Sparse 向量、嵌入函数增强