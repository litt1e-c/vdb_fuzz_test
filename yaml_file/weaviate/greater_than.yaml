operator_id: greater_than
family: comparison
syntax_examples:
- Filter.by_property("points").greater_than(300)
- Filter.by_property("dateVal").greater_than("2024-02-29T15:59:59Z")
- 'where: { path: ["wordCount"], operator: GreaterThan, valueInt: 1000 }'
doc_status: operator_documented
doc_source_urls:
- https://docs.weaviate.io/weaviate/search/filters
- https://docs.weaviate.io/weaviate/api/graphql/filters
- https://docs.weaviate.io/weaviate/config-refs/indexing/inverted-index
doc_supported_types:
- scalar_numeric
- scalar_datetime
doc_semantics: GreaterThan is a documented where-filter operator that matches objects whose path value is strictly greater than the provided typed value; the official docs show numeric examples, list `GreaterThan` in the GraphQL where-operator set, and state that RFC3339 date values can be filtered similarly to numbers.
doc_notes:
- The checked Filters guide documents property filtering with comparison operators and shows Python-client `greater_than(...)` usage for numeric properties.
- The checked GraphQL filter reference lists `GreaterThan` as a where-filter operator and documents typed value fields such as `valueInt`, `valueNumber`, and `valueDate`.
- The checked docs state that dates use RFC3339 format and can be filtered similarly to numbers.
- The checked inverted-index reference says to enable one or both of `indexFilterable` and `indexRangeFilters`; when both are enabled, comparison operators use the range index, while equality and inequality use the filterable index.
- The checked docs do not provide a GreaterThan-specific null or missing truth table, signed-zero rule for NUMBER, adjacent IEEE-754 boundary rule, subnormal-number rule, or a precise statement about how standalone range-only indexing behaves in the current Python-client/server combination.
verify_status: mismatch_observed
observed_summary: 'On local Weaviate v1.36.5 with weaviate-client 4.18.1, `greater_than_operator.py` passed the validated subset for INT, regular finite NUMBER, DATE with UTC-normalized instants, and strict exclusion of null or omitted scalar rows, all on properties created with `index_filterable=True`. The same local script also confirmed a deeper boundary subset that the fuzzer now targets: adjacent finite IEEE-754 thresholds around `1.0` and `1e12`, a safe near-zero boundary using the negative smallest subnormal instead of `-0.0`, and RFC3339 DATE comparisons separated by single-microsecond steps. Observation-only checks still found two important limitations. First, a property created with `index_filterable=False` and `index_range_filterable=True` was read back from collection config with `index_range_filters=False`, and `greater_than(...)` on that property failed with an error requiring `indexFilterable`; standalone range-only coverage is therefore not validated locally. Second, signed-zero
  behavior is inconsistent: `greater_than(0.0)` returned only positive rows, but `greater_than(-0.0)` unexpectedly returned the negative row `-1.0`, the `+0.0` row, and positive rows. This signed-zero mismatch is treated as local engine-side observation related to issue10917, not as oracle truth.'
oracle_support:
- pandas
- pqs
case_refs:
- issue10917
repro_path: operator_test/weaviate/greater_than_operator.py
oracle_mapping: Current fuzzer models greater_than with pandas strict `>` on generated INT, NUMBER, and DATE masks; DATE values are normalized to UTC timestamps, and null or omitted rows are excluded. The implemented NUMBER subset now includes adjacent finite float thresholds around observed values and safe near-zero subnormal thresholds, while DATE generation includes microsecond-resolution RFC3339 boundaries. PQS uses pivot-true greater_than and bounded-range variants on fields that are locally queryable. Current generation is intentionally limited to fields tracked as filterable in this environment, so standalone range-only index configurations are not claimed. Signed `-0.0`, text or boolean ordering, arrays, objects, metadata filters, reference filters, and undocumented null/index interactions are outside the validated subset. This is our oracle assumption, not an official claim.
