operator_id: not
family: logical
syntax_examples:
- Filter.not_(Filter.by_property("round").equal("Double"))
- Filter.not_(Filter.by_property("nullableScore").is_none(True))
- 'where: { operator: Not, operands: [...] }'
doc_status: operator_documented
doc_source_urls:
- https://docs.weaviate.io/weaviate/search/filters
- https://docs.weaviate.io/weaviate/api/graphql/filters
doc_supported_types:
- unknown
doc_semantics: NOT negates a filter condition; the checked Python v4 examples use `Filter.not_(...)`, and the GraphQL where structure lists `Not` as a filter operator that wraps operands.
doc_notes:
- The checked Filters guide states that multiple conditions use `And`, `Or`, and `Not`, and shows a Python example where `Filter.not_(Filter.by_property("answer").equal("Yucatan"))` is composed with other filters.
- The checked API reference lists `Not` as a where-filter operator, but it does not specify a complete null/missing truth table for negated property predicates.
- The checked API reference null-state section says zero-length arrays and empty strings are equivalent to a null value; this is operand-level null-state semantics, not NOT-specific truth-table documentation.
- The checked docs do not define empty operand lists, short-circuit behavior, double-NOT normalization, or OBJECT-specific non-null filtering semantics.
verify_status: edge_validated
observed_summary: 'On local Weaviate v1.36.5 with weaviate-client 4.18.1, `not_operator.py` passed the expanded tested subset: NOT over scalar text equality, numeric comparison, text equality with explicit-null/omitted/empty-string values, a numeric range conjunction, array `contains_any` with explicit-null/omitted/empty-array values, scalar/text/array `is_none(True)` and `is_none(False)` under NOT, OBJECT `is_none(True)` under NOT, double NOT over scalar `is_none(True)`, and NOT over an OR compound all returned the expected tag sets. Empty strings and zero-length arrays behaved as null-equivalent for null-state filters. Empty OBJECT `{}` behaved as non-null in the tested subset. Direct OBJECT `is_none(False)` returned an empty result locally and is treated as an unimplemented or unsupported feature boundary consistent with GitHub issue10642, while `NOT(OBJECT is_none(True))` is a locally validated workaround subset.'
