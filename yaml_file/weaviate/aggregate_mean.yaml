- pandas
case_refs: []
repro_path: operator_test/weaviate/aggregate_operator.py
oracle_mapping: The oracle computes mean over present scalar values or flattened numeric-array elements. Integer means are still compared as floats. Empty-result behavior follows the locally observed client defaults.
