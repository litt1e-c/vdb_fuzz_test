operator_id: aggregate_mean
family: other
syntax_examples:
- collection.aggregate.over_all(return_metrics=Metrics("intVal").integer(mean=True))
- collection.aggregate.over_all(return_metrics=Metrics("numArr").number(mean=True))
doc_status: operator_documented
