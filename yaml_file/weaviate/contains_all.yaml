operator_id: contains_all
family: array_membership
syntax_examples:
- Filter.by_property("languages_spoken").contains_all(["Chinese", "English"])
- Filter.by_property("labelsArray").contains_all(["Alpha", "Beta"])
- 'where: { path: ["answer"], operator: ContainsAll, valueText: ["australia", "india"] }'
doc_status: operator_documented
doc_source_urls:
- https://docs.weaviate.io/weaviate/search/filters
- https://docs.weaviate.io/weaviate/api/graphql/filters
- https://docs.weaviate.io/weaviate/config-refs/collections
doc_supported_types:
- scalar_text
- array_field
doc_semantics: ContainsAll is a documented where-filter operator for array and text properties. It expects an array of input values and returns objects where all input values are present. For text properties, the docs say the text is treated as an array of tokens according to the property's tokenization scheme.
doc_notes:
- The checked Filters guide documents `contains_all(...)` on a text property and says it matches objects where the property contains all of the input values.
- The checked GraphQL filter reference lists `ContainsAll` as valid only for array and text properties.
- The checked GraphQL filter reference says text is treated as an array of tokens based on the chosen tokenization scheme when using `ContainsAny`, `ContainsAll`, and `ContainsNone`.
- The checked collections reference says tokenization influences where filters; `field` treats the entire text value as one token, while `word` splits on non-alphanumeric characters and lowercases the resulting tokens.
- The checked docs do not provide a ContainsAll-specific null or missing truth table, explicit empty-array truth table, duplicate-target rule, or a precise statement about whether scalar-text ContainsAll requires `indexFilterable`, `indexSearchable`, or either in the current client/server combination.
verify_status: edge_validated
observed_summary: On local Weaviate v1.36.5 with weaviate-client 4.20.1, `contains_all_operator.py` passed the validated subset for INT_ARRAY, NUMBER_ARRAY, BOOL_ARRAY, FIELD-tokenized TEXT_ARRAY exact element membership, and FIELD-tokenized scalar TEXT exact whole-value-token membership. In the validated subset, positive `contains_all` excluded explicit-null and omitted array rows, and also excluded explicit-null and omitted scalar FIELD text rows. Observation-only checks exposed three important boundaries. First, scalar TEXT `contains_all(...)` also worked on a FIELD-tokenized property created with `index_filterable=False` and `index_searchable=True`, so local queryability is broader than a filterable-only text subset. Second, WORD-tokenized scalar TEXT `contains_all(["alpha", "beta"])` matched `Alpha Beta`, `alpha beta`, and `Alpha-Beta`, consistent with lowercased tokenized matching but outside the current main oracle subset. Third, an explicit empty TEXT_ARRAY was successfully inserted
  and fetched back as `[]`, and that empty-array row did not match `contains_all(["red"])` locally, even though the current fuzzer still normalizes generated empty arrays to null or omitted rows. These searchable-only, WORD-tokenization, and explicit-empty-array results are treated as local observations rather than full official semantics.
oracle_support:
- pandas
- pqs
