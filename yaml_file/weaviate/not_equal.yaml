operator_id: not_equal
family: comparison
syntax_examples:
- Filter.by_property("intVal").not_equal(10)
- Filter.by_property("textField").not_equal("Alpha Beta")
- 'where: { path: ["wordCount"], operator: NotEqual, valueInt: 1000 }'
doc_status: operator_documented
doc_source_urls:
- https://docs.weaviate.io/weaviate/search/filters
- https://docs.weaviate.io/weaviate/api/graphql/filters
doc_supported_types:
- scalar_numeric
- scalar_text
- scalar_bool
- scalar_datetime
doc_semantics: NotEqual is a documented where-filter operator that compares a path value against a provided typed value and matches values that are not equal; the API reference lists typed values such as valueInt, valueBoolean, valueText, valueNumber, and valueDate.
doc_notes:
- The checked API reference lists `NotEqual` among where-filter operators and documents typed value fields for int, boolean, text-like, number, and date values.
- The checked API reference says date values use RFC3339 format and that datetimes can be filtered similarly to numbers.
- The checked API reference documents multi-word text tokenization behavior for `Equal`, but it does not provide separate tokenization rules for `NotEqual`; the current fuzzer uses Tokenization.FIELD for TEXT and TEXT_ARRAY fields.
- The checked API reference null-state section says zero-length arrays and empty strings are equivalent to a null value for IsNull; this is not documented as NotEqual semantics.
- The checked docs do not provide a NotEqual-specific null/missing truth table, signed-zero rule for NUMBER, direct empty-string target rule, array equality rule, object rule, metadata-filter rule, or reference-filter rule.
verify_status: mismatch_observed
observed_summary: 'On local Weaviate v1.36.5 with weaviate-client 4.18.1, `not_equal_operator.py` passed the tested oracle subset: INT, BOOL, regular finite NUMBER, Tokenization.FIELD TEXT, and DATE NotEqual with UTC-normalized instants matched expected tag sets. Direct NotEqual on nullable INT, BOOL, NUMBER, TEXT, and DATE included explicit-null and omitted rows; for non-empty TEXT targets, an empty-string row was also included. In the tested FIELD-tokenized text subset, direct NotEqual matched NOT(Equal). The same local probe also validated a search-only FIELD TEXT extension: a property created with `index_filterable=False` and `index_searchable=True` still supported exact case-sensitive `NotEqual(...)` matching on the full stored string, which is useful for the inverted-focused profile even though the checked docs do not specify this index requirement precisely. Observation-only probes showed WORD-tokenized `not_equal("Alpha Beta")` returned no rows for the small dataset, and direct `NotEqual("")`
  matched the non-empty text row plus explicit-null and omitted rows. Signed-zero probes relevant to local historical issue10917 showed mismatches against mathematical zero equality: `not_equal(0.0)` included the -0.0 row, and `not_equal(-0.0)` included the +0.0 row. The Python client also emitted a boolean NotEqual serialization deprecation warning, but the query result passed.'
oracle_support:
- pandas
