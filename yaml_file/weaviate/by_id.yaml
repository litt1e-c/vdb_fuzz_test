- Filter.by_id().equal("8f7f4f6d-0000-0000-0000-000000000001")
- Filter.by_id().contains_any(["8f7f4f6d-0000-0000-0000-000000000001", "8f7f4f6d-0000-0000-0000-000000000002"])
- 'where: { path: ["id"], operator: Equal, valueText: "8f7f4f6d-0000-0000-0000-000000000001" }'
