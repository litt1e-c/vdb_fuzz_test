oracle_mapping: "The main Weaviate oracle now generates scalar `contains_any` and `contains_none` for INT, NUMBER, BOOL, and DATE, and generates scalar `contains_all` only as a singleton list for the same types. pandas models these as scalar membership / exclusion over the validated local subset. Null or missing scalar rows are treated as matches for `contains_none` and as non-matches for `contains_any` and singleton `contains_all`. PQS pivot-true generation includes self-target `contains_any` / singleton `contains_all` and noise-target `contains_none` for these scalar types. This is our local oracle assumption, not a universal official claim."
