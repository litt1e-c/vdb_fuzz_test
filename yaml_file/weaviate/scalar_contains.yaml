operator_id: scalar_contains
family: membership
syntax_examples:
  - 'Filter.by_property("intVal").contains_any([1, 9])'
  - 'Filter.by_property("flag").contains_none([True])'
  - 'Filter.by_property("ts").contains_all([datetime(2024, 1, 2, tzinfo=UTC)])'
doc_status: local_extension_validated
doc_source_urls:
  - "https://docs.weaviate.io/weaviate/search/filters"
  - "https://docs.weaviate.io/weaviate/api/graphql/filters"
doc_supported_types:
  - int
  - number
  - boolean
  - date
doc_semantics: "The checked official docs explicitly document `ContainsAny`, `ContainsAll`, and `ContainsNone` for text and array-like uses. This YAML records an additional locally validated scalar subset on local Weaviate v1.36.10: scalar INT, NUMBER, BOOL, and DATE also accept these operators in the installed Python-client/server combination."
doc_notes:
  - "Because the checked docs emphasize array and text semantics, this scalar subset is adopted as a local validated oracle assumption rather than as a broad official guarantee."
  - "The validated subset is intentionally conservative: `contains_any` and `contains_none` are adopted for scalar INT/NUMBER/BOOL/DATE, and `contains_all` is adopted only for singleton target lists where local behavior matched equality."
  - "The local validation showed null or missing scalar rows match positive `contains_none(...)` and do not match positive `contains_any(...)`."
  - "A multi-target scalar `contains_all([v1, v2])` with distinct targets returned no rows in the tested INT case; the main oracle therefore keeps scalar `contains_all` to the singleton subset."
verify_status: edge_validated
observed_summary: "On local Weaviate v1.36.10 with the installed Python client, `scalar_contains_operator.py` validated scalar membership semantics beyond the previous array/text subset. INT, NUMBER, BOOL, and DATE all accepted `contains_any(...)` and `contains_none(...)` and returned the expected tag sets. For each of these scalar types, a singleton `contains_all([v])` behaved like equality to `v`. Missing scalar rows matched positive `contains_none(...)` and were excluded from positive `contains_any(...)`. A multi-target scalar `contains_all([1, 2])` on the INT probe returned no rows and is kept observation-only."
oracle_support:
  - pandas
  - pqs
  - rest-filter
case_refs: []
