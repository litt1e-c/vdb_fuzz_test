operator_id: scalar_contains
family: array_membership
syntax_examples:
  - 'Filter.by_property("intVal").contains_any([1, 9])'
  - 'Filter.by_property("flag").contains_none([True])'
  - 'Filter.by_property("ts").contains_all([datetime(2024, 1, 2, tzinfo=UTC)])'
doc_status: derived
doc_source_urls:
  - "https://docs.weaviate.io/weaviate/search/filters"
  - "https://docs.weaviate.io/weaviate/api/graphql/filters"
doc_supported_types:
  - scalar_numeric
  - scalar_bool
  - scalar_datetime
doc_semantics: "The official filter docs describe `ContainsAny`, `ContainsAll`, and `ContainsNone` as membership-style operators, but they do not explicitly specify the scalar INT/NUMBER/BOOL/DATE subset recorded in this entry."
doc_notes:
  - "This entry captures a locally validated scalar subset on the installed Python-client/server stack."
  - "The main oracle keeps scalar `contains_all` to singleton target lists only."
verify_status: edge_validated
observed_summary: "Local `scalar_contains_operator.py` validation on Weaviate v1.36.10 showed that scalar INT, NUMBER, BOOL, and DATE accepted `contains_any(...)` and `contains_none(...)`. Singleton `contains_all([v])` behaved like equality, while a multi-target scalar `contains_all([1, 2])` INT probe returned no rows. Missing scalar rows matched positive `contains_none(...)` and did not match positive `contains_any(...)`."
oracle_support:
  - pandas
  - pqs
case_refs:
  - int_scalar_contains_any
  - int_scalar_contains_none
  - int_scalar_contains_all_singleton
  - number_scalar_contains_any
  - bool_scalar_contains_any
  - date_scalar_contains_any
repro_path: "operator_test/weaviate/scalar_contains_operator.py"
oracle_mapping: "The pandas oracle models the validated scalar subset as explicit scalar membership / exclusion masks: `contains_any` behaves like equality-OR over the target list, `contains_none` behaves like exclusion and keeps missing rows, and scalar `contains_all` is restricted to singleton targets. PQS only generates pivot-true instances inside this validated subset, and REST mode reuses the same pandas-side mask semantics."
