doc_semantics: "Aggregate count is a documented per-property metric, while `total_count` reports the number of matched objects for the whole aggregate query. Local validation shows scalar-property count tracks present non-null values, and array-property count tracks flattened element count."
doc_notes:
  - "The checked aggregate guide documents `count` on aggregate metrics and `total_count` on the aggregate result."
  - "The checked docs do not provide a full null / missing / empty-array truth table for per-property aggregate count."
  - "Local validation indicates missing, null, and empty arrays contribute zero to per-property count, while `total_count` still counts matched objects."
