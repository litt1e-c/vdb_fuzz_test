doc_semantics: AND combines multiple filter conditions so that only objects satisfying all operand filters are matched; in the GraphQL where structure, `And` uses an operands list, and the Python v4 client exposes both pairwise `&` and list-style `Filter.all_of([...])` composition.
doc_notes:
- The checked Filters guide states that multiple conditions use `And`, `Or`, and `Not`; it documents Python v4 `Filter.all_of([...])` and `&` as AND composition forms.
- The checked API reference lists `And` as a where-filter operator and states that if the operator is `And` or `Or`, operands are a list of where filters.
- The checked docs show nested And/Or filters and an AND operand containing NOT, but do not specify empty operand lists, evaluation order, short-circuit behavior, or complete null/missing truth tables.
verify_status: edge_validated
observed_summary: 'On local Weaviate v1.36.5 with weaviate-client 4.18.1, `and_operator.py` passed the tested subset: pairwise `&`, `Filter.all_of` with three operands, nested AND/OR, AND with a NOT operand, AND between a numeric predicate and `is_none(True)` over explicit-null/omitted scalar rows, and AND between a numeric predicate and OBJECT `is_none(True)` over explicit-null/omitted object rows all returned the expected tag sets. The null/missing and OBJECT checks are local evidence for the fuzzer subset, not official AND-specific semantics; GitHub issue10642 is currently labeled as discussion/feature request/reproducible rather than a confirmed bug, so OBJECT `is_none(False)` is treated here as an unimplemented or unsupported feature boundary outside this AND record''s validated subset.'
