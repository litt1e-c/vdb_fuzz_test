operator_id: and
family: logical
syntax_examples:
- Filter.by_property("round").equal("Double") & Filter.by_property("points").less_than(600)
- Filter.all_of([Filter.by_property("points").greater_than(300), Filter.by_property("points").less_than(700)])
- 'where: { operator: And, operands: [...] }'
doc_status: operator_documented
