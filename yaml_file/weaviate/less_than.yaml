operator_id: less_than
family: comparison
syntax_examples:
  - 'Filter.by_property("points").less_than(300)'
  - 'Filter.by_property("dateVal").less_than("2024-03-01T00:00:00Z")'
  - 'where: { path: ["wordCount"], operator: LessThan, valueInt: 1000 }'
doc_status: operator_documented
doc_source_urls:
  - "https://docs.weaviate.io/weaviate/search/filters"
  - "https://docs.weaviate.io/weaviate/api/graphql/filters"
  - "https://docs.weaviate.io/weaviate/config-refs/indexing/inverted-index"
doc_supported_types:
  - int
  - number
  - date
doc_semantics: "LessThan is a documented where-filter operator that matches objects whose path value is strictly less than the provided typed value; the official docs show comparison filtering on numeric properties, list `LessThan` in the GraphQL where-operator set, and state that RFC3339 date values can be filtered similarly to numbers."
doc_notes:
  - "The checked Filters guide documents property filtering with comparison operators and shows Python-client `less_than(...)` usage for numeric properties."
  - "The checked GraphQL filter reference lists `LessThan` as a where-filter operator and documents typed value fields such as `valueInt`, `valueNumber`, and `valueDate`."
  - "The checked docs state that dates use RFC3339 format and can be filtered similarly to numbers."
  - "The checked inverted-index reference says to enable one or both of `indexFilterable` and `indexRangeFilters`; when both are enabled, comparison operators use the range index, while equality and inequality use the filterable index."
  - "The checked docs do not provide a LessThan-specific null or missing truth table, signed-zero rule for NUMBER, or a precise statement about how standalone range-only indexing behaves in the current Python-client/server combination."
verify_status: mismatch_observed
observed_summary: "On local Weaviate v1.36.5 with weaviate-client 4.18.1, `less_than_operator.py` passed the validated subset for INT, regular finite NUMBER, DATE with UTC-normalized instants, and strict exclusion of null or omitted scalar rows, all on properties created with `index_filterable=True`. Observation-only checks found two important boundaries. First, a property created with `index_filterable=False` and `index_range_filterable=True` was read back from collection config with `index_range_filters=False`, and `less_than(...)` on that property failed with an error requiring `indexFilterable`; standalone range-only coverage is therefore not validated locally. Second, signed-zero behavior is inconsistent: `less_than(0.0)` unexpectedly included the `-0.0` row in addition to `-1.0`, while `less_than(-0.0)` returned an empty set instead of the negative row `-1.0`. These signed-zero mismatches are treated as local engine-side observations related to issue10917, not as oracle truth."
oracle_support:
  - pandas
  - pqs
case_refs:
  - issue10917
repro_path: "/home/caihao/compare_test/operator_test/weaviate/less_than_operator.py"
oracle_mapping: "Current fuzzer models less_than with pandas strict `<` on generated INT, NUMBER, and DATE masks; DATE values are normalized to UTC timestamps, and null or omitted rows are excluded. After the local refinement in this round, PQS also contains direct pivot-true less_than generation for INT, NUMBER, and DATE, in addition to existing bounded-range uses. Current generation remains intentionally limited to fields that are locally queryable in this environment, so standalone range-only index configurations are not claimed. Signed `-0.0`, text or boolean ordering, arrays, objects, metadata filters, reference filters, and undocumented null/index interactions are outside the validated subset. This is our oracle assumption, not an official claim."
