oracle_mapping: The REST filter oracle builds a conservative recursive `where` JSON subset, computes the expected ID set from pandas using a dedicated REST evaluator over the final JSON tree, and compares both the Python client filter-builder path and the REST dry-run path against that expected set. DATE and DATE_ARRAY comparisons are normalized by parsed UTC instants, and zero-length arrays are treated as null-equivalent in the claimed subset. This is our local oracle rule, not an official claim.
