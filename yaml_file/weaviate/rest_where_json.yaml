doc_semantics: Batch delete dry-run accepts a REST `where` JSON payload under `match.where`, parses it through the REST filter path, and returns the matched object IDs in `results.objects` without deleting data. This provides a direct REST oracle path for filter semantics.
doc_notes:
- The checked docs document batch delete and where-style filters separately; local validation shows `DELETE /v1/batch/objects` with `dryRun=true` and `output=verbose` returns match counts and IDs without deleting objects.
- The local operator probe validated scalar comparisons, `Like`, `IsNull`, `ContainsAny` / `ContainsAll` / `ContainsNone`, boolean composition, `len(property)`, and array/date payloads through the REST JSON path.
- For REST JSON arrays, the server expects typed array keys such as `valueIntArray`, `valueTextArray`, `valueBooleanArray`, `valueNumberArray`, and `valueDateArray` rather than scalar keys carrying JSON arrays.
- Local validation showed REST date-array comparisons normalize timestamps by instant rather than by raw string formatting; the oracle now compares DATE / DATE_ARRAY values by parsed UTC instants.
- The current oracle claims only the locally validated scalar/array subset and does not claim nested object path filtering.
verify_status: edge_validated
observed_summary: On local Weaviate v1.36.x with anonymous auth enabled, `rest_where_json_operator.py` passed the validated subset through `DELETE /v1/batch/objects` dry-run. The probe covered `Equal`, `NotEqual`, numeric/date ranges, `Like`, `IsNull`, scalar-text `ContainsAny` / `ContainsNone`, array `ContainsAny` / `ContainsAll` / `ContainsNone`, `len(text)`, `And`, `Or`, `Not`, and the deprecated `valueString` alias. A local semantic check also showed `BOOL_ARRAY ContainsAll([true])` behaves like membership for that singleton target.
