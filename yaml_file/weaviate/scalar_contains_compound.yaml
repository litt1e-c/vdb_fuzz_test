operator_id: scalar_contains_compound
family: array_membership
syntax_examples:
- Filter.not_(Filter.by_property("intVal").contains_none([1]))
- Filter.by_property("intVal").contains_none([1]) & Filter.by_property("intVal").greater_or_equal(2)
- Filter.by_property("numVal").contains_all([2.5]) & Filter.not_(Filter.by_property("numVal").contains_none([2.5]))
doc_status: derived
doc_source_urls:
- https://docs.weaviate.io/weaviate/search/filters
- https://docs.weaviate.io/weaviate/api/graphql/filters
doc_supported_types:
- scalar_numeric
- scalar_bool
- scalar_datetime
doc_semantics: The official filter docs describe `ContainsAny`, `ContainsAll`, and `ContainsNone` together with generic boolean filter composition, but they do not explicitly document the scalar INT/NUMBER/BOOL/DATE compound subset recorded here.
doc_notes:
- Validated patterns include NOT wrapping scalar contains, scalar contains plus numeric/date guards, and `contains_any(...) OR is_null(true)`.
- This entry is intentionally narrower than a full algebraic law set and only records the directly checked compound subset.
verify_status: edge_validated
observed_summary: 'On local Weaviate v1.36.10, `scalar_contains_compound_operator.py` validated deeper scalar membership compositions: `NOT(int contains_none [1])` returned only the matching INT rows, `int contains_none [1] AND int >= 2` returned the expected present non-1 rows within the guarded range, `NOT(flag contains_any [true])` included false rows plus the missing row, `num contains_all [2.5] AND NOT(num contains_none [2.5])` remained stable on the 2.5 rows, and `date contains_any [2024-01-02] OR is_null` included both matching timestamps and the missing-date row.'
oracle_support:
- pandas
- pqs
case_refs:
- int_not_contains_none_singleton
- int_contains_none_and_ge
- bool_not_contains_any_true
- number_contains_all_and_not_none
- date_contains_any_or_null
repro_path: operator_test/weaviate/scalar_contains_compound_operator.py
oracle_mapping: The pandas oracle models this deeper subset with explicit boolean-mask composition on top of the validated scalar membership masks, preserving the local null/missing behavior of positive and negated contains predicates. PQS only emits pivot-true compounds from this checked subset, and REST mode reuses the same pandas-side truth conditions.
