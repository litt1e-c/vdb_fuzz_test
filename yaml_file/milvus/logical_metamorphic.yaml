doc_semantics: "Under controlled predicates that avoid NULL/UNKNOWN ambiguity, logical equivalence transformations such as A∧True, A∨False, double negation, `in` versus disjunction, and `not in` versus `not (in)` should return the same ID set. In addition, `and` should bind more tightly than `or`."
doc_notes:
  - "This entry focuses on explainable equivalence transformations rather than operator breadth."
  - "Expressions that may trigger NULL/UNKNOWN ambiguity are handled separately under the `three_valued_logic` entry."
verify_status: edge_validated
observed_summary: "On the local fixed dataset, all checked logical equivalences and precedence cases returned identical ID sets. The contradiction probe returned the empty set, and the guarded tautology returned the full non-null domain as expected."
