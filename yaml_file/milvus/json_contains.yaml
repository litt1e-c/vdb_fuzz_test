operator_id: json_contains
family: json_special
syntax_examples:
  - 'json_contains(meta["tags"], "sale")'
  - 'json_contains(meta["nums"], 2)'
  - 'json_contains(meta["pairs"], [1, 2])'

doc_status: operator_documented
doc_source_urls:
  - "https://milvus.io/docs/id/json-field-overview.md"
  - "https://milvus.io/docs/v2.4.x/use-json-fields.md"
doc_supported_types:
  - json_field
doc_semantics: "json_contains checks whether the JSON array at the target path contains a specified element or sub-array."
doc_notes:
  - "The checked official JSON pages explicitly document json_contains for JSON fields."
  - "The checked current JSON Field Overview page states that json_contains can match either an element or a sub-array."
  - "The checked official pages do not clearly specify missing-key behavior, NULL behavior, non-array-path behavior, or truth-table behavior under boolean composition."

verify_status: edge_validated
observed_summary: "Local validation matched scalar-member, numeric-member, and sub-array containment on JSON-array paths in the sampled cases. Missing key, explicit null at the target path inside a non-null JSON object, and non-array target paths were filtered out in direct queries; under raw NOT, rows whose whole JSON field was null or omitted stayed excluded, while missing-key, explicit-null-path, and non-array-path rows were included."
oracle_support:
  - pandas
  - pqs
case_refs: []
repro_path: "/home/caihao/compare_test/operator_test/milvus/json_contains_operator.py"

oracle_mapping: "Current main pandas oracle maps json_contains over JSON-array paths to Python membership on normalized JSON list values, returning UNKNOWN for a null or omitted JSON field and FALSE for a missing path, an explicit null at the target path inside a non-null JSON object, or a non-array path; PQS uses the same normalized candidate builder. The current sound subset covers scalar members and list members composed of JSON-serializable scalars, while dict-valued array members remain outside the modeled subset; this is our oracle assumption, not an official claim."
