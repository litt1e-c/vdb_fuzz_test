operator_id: modulus
family: arithmetic
syntax_examples:
  - 'c_int % 2 == 0'
  - 'c_int % 4 > 0'
  - 'c_int % 2 == -1'

doc_status: operator_documented
doc_source_urls:
  - https://milvus.io/docs/basic-operators.md
doc_supported_types:
  - scalar_numeric
doc_semantics: "The checked official Basic Operators page lists `%` as a supported arithmetic operator for building filter conditions on numeric fields."
doc_notes:
  - "The checked official page lists `%` but does not provide a modulus-specific example."
  - "The checked official page does not specify whether `%` applies to all numeric types or only integers, and it does not define zero-divisor behavior or signed-remainder semantics."

verify_status: edge_validated
observed_summary: "On the local 19532 deployment, INT modulus matched truncation-style signed remainder behavior: `5 % 2 == 1`, `-5 % 2 == -1`, and `0 % 2 == 0`. FLOAT and DOUBLE modulus expressions were rejected with `modulo can only apply on integer types`. Zero-divisor modulus was not executed on the shared server."
oracle_support:
  - pandas
  - pqs
case_refs:
  - issue47285
repro_path: /home/caihao/compare_test/operator_test/milvus/modulus_operator.py

oracle_mapping: "The pandas oracle currently models `%` only for non-null INT fields using truncation-style signed remainder via `np.fmod` plus integer casting, and the fuzzer intentionally does not emit FLOAT/DOUBLE `%` expressions or zero-divisor cases. This is our oracle assumption, not an official claim."
