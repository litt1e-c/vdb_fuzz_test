operator_id: subtract
family: arithmetic
syntax_examples:
  - 'price - 10 > 100'
  - 'c_int - 33 == 67'
  - 'c_int - 1 >= 0'

doc_status: operator_documented
doc_source_urls:
  - https://milvus.io/docs/id/basic-operators.md
doc_supported_types:
  - numeric
doc_semantics: "The checked official basic-operators page lists `-` as a supported arithmetic operator for building filter conditions on numeric fields."
doc_notes:
  - "The checked official page lists `-` but does not provide a `-`-specific example."
  - "The checked official page does not define overflow, null-propagation, or precision semantics for `-`."

verify_status: mismatch_observed
observed_summary: "Safe INT, FLOAT, and DOUBLE subtraction probes matched mathematical expectations on the local 19532 deployment, but INT64 underflow probes showed wraparound-related mismatches: `c_int - 1 >= 0` produced a false positive at INT64_MIN, and `c_int - 10 < 0` missed an INT64_MIN row that should satisfy the mathematical condition."
oracle_support:
  - pandas
  - PQS
case_refs:
  - issue48440
repro_path: /home/caihao/compare_test/operator_test/milvus/subtract_operator.py

oracle_mapping: "The pandas oracle maps `field - const` to Python arithmetic on non-null numeric rows, and both the equivalence generator and PQS now emit INT `-` expressions only when every non-null row can subtract the chosen constant without leaving the INT64 range; FLOAT/DOUBLE keep the existing tolerance-based comparison path. This is our oracle assumption, not an official claim."
