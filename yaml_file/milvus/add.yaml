operator_id: add
family: arithmetic
syntax_examples:
  - 'price + 10 > 100'
  - 'c_int + 33 == 133'
  - 'c_int + 33 <= 19974'

doc_status: operator_documented
doc_source_urls:
  - https://milvus.io/docs/id/basic-operators.md
doc_supported_types:
  - scalar_numeric
doc_semantics: "The checked official basic-operators page lists `+` as a supported arithmetic operator for building filter conditions on numeric fields."
doc_notes:
  - "The checked official page lists `+` but does not provide a `+`-specific example."
  - "The checked official page does not define overflow, null-propagation, or precision semantics for `+`."

verify_status: mismatch_observed
observed_summary: "Safe INT, FLOAT, and DOUBLE addition probes matched mathematical expectations on the local 19532 deployment, but an INT64 overflow probe using a value at INT64_MAX - 1 returned the overflow row for `c_int + 33 <= 19974`, showing an overflow-related false positive; a second upper-bound sign-flip probe using `c_int + 1 > 0` did not mismatch on this build."
oracle_support:
  - pandas
  - pqs
case_refs:
  - issue48440
repro_path: /home/caihao/compare_test/operator_test/milvus/add_operator.py

oracle_mapping: "The pandas oracle maps `field + const` to Python arithmetic on non-null numeric rows, and both the equivalence generator and PQS now emit INT `+` expressions only when every non-null row can add the chosen constant without leaving the INT64 range; FLOAT/DOUBLE keep the existing tolerance-based comparison path. This is our oracle assumption, not an official claim."
