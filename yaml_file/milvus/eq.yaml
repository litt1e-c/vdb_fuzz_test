oracle_mapping: "Current fuzzer maps scalar BOOL/INT/VARCHAR == to pandas equality with an explicit is not null guard, while JSON-path equality compares extracted scalar values, treating a null JSON field as UNKNOWN and a missing path inside a non-null JSON object as FALSE; the main atomic generator intentionally avoids scalar FLOAT == to reduce precision false positives. In PQS, pivot-true equality is generated directly for BOOL and through boundary-style true expressions for INT, VARCHAR, and JSON-path values; this is our oracle assumption, not an official claim."