doc_semantics: "ARRAY_CONTAINS_ALL checks whether an array field contains all specified elements."
doc_notes:
  - "The checked Array Operators page explicitly documents ARRAY_CONTAINS_ALL."
  - "The checked Array Field page says array elements share one scalar element type and ARRAY does not support JSON as an element type."
  - "The checked Nullable & Default page says ARRAY fields are null only when the whole field is None or omitted."
  - "The checked official pages do not clearly specify duplicate-item behavior or raw null/UNKNOWN behavior for ARRAY_CONTAINS_ALL under boolean composition."

verify_status: edge_validated
observed_summary: "Local validation matched integer, boolean, and string ARRAY_CONTAINS_ALL subset checks in the sampled direct queries. Empty arrays behaved as non-null arrays with a false result for non-empty target lists, while null or omitted arrays were excluded in direct queries and also stayed excluded under raw `not (array_contains_all(...))` in the sampled environment."
