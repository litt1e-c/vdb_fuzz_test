oracle_mapping: "Current main pandas oracle maps ARRAY_CONTAINS_ALL to `all(item in arr for item in targets)` on Python lists and emits the guarded subset `(arr is not null and array_contains_all(arr, targets))`, while PQS emits raw positive witness forms for non-null arrays. Duplicate-sensitive multiplicity is not claimed, and raw null-array behavior under arbitrary boolean composition is not fully modeled in the main oracle; this is our oracle assumption, not an official claim."