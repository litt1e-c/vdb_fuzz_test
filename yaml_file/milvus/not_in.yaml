verify_status: edge_validated
observed_summary: "Local validation showed that scalar workaround form `(role is not null and (not (role in [\"admin\"])))` returned `[2]`, while both JSON-path workaround form `(meta is not null and (not (meta[\"role\"] in [\"admin\"])))` and direct syntax `meta[\"role\"] not in [\"admin\"]` returned `[2, 3]`, so a missing JSON key inside a non-null JSON object is currently treated as matching the negated membership form."

