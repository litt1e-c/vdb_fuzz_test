oracle_mapping: "Current fuzzer models `not_in` as `not (x in [...])`: scalar BOOL/INT/VARCHAR paths negate the pandas membership mask and add an explicit `is not null` guard, JSON-path drill-down now uses the same workaround with whole-field null kept as UNKNOWN and missing keys inside a non-null JSON object treated as inner `in == False`, and PQS generates true `not_in` predicates by choosing exclusion lists that do not contain the pivot value. This is our oracle assumption, not an official claim."
