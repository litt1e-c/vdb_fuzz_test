operator_id: not_in
family: range
syntax_examples:
  - 'not (role in ["admin"])'
  - 'not (meta["role"] in ["admin"])'
  - 'meta["role"] not in ["admin"]'

doc_status: unspecified
doc_source_urls:
  - "https://milvus.io/docs/basic-operators.md"

doc_supported_types:
  - unknown

doc_semantics: "Not clearly specified in the checked official pages."

doc_notes:
  - "The checked official Basic Operators page documents `IN` under range operators but does not list `NOT IN` as a supported operator."
  - "No dedicated `NOT IN` example or official missing-key/null semantics were found in the checked page."

verify_status: mismatch_observed
observed_summary: >-
  Normative checks pass for guarded forms
  (`role is not null and role not in [...]`,
  `meta is not null and meta["role"] not in [...]`) and for the metamorphic
  equivalence `x not in S == not (x in S)` under the same guard. A known
  mismatch is observed on unguarded JSON-path direct syntax:
  `meta["role"] not in ["admin"]` returns `[2, 3, 4]` (includes whole-field-null row),
  differing from SQL 3VL-style expectation `[2, 3]`.

oracle_support:
  - pandas
  - pqs

case_refs: []

repro_path: "/home/caihao/compare_test/operator_test/milvus/not_in_operator.py"

oracle_mapping: >-
  Oracle maps `not_in` to guarded negated membership:
  `(x is not null) and not (x in [...])` for scalar paths, and
  `(json_field is not null) and not (json[path] in [...])` for JSON-path paths.
  Unguarded direct `json[path] not in [...]` is treated as a known semantic probe
  (mismatch-observed) and should not be used as a strict positive invariant in
  the main fuzzer.
