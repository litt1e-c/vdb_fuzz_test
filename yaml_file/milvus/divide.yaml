family: arithmetic
syntax_examples:
  - 'price / 2 > 100'
  - 'c_int / 2 == 50'
  - 'c_float / 2 <= 1.5'

doc_status: operator_documented
doc_source_urls:
  - https://milvus.io/docs/basic-operators.md
doc_supported_types:
  - scalar_numeric
doc_semantics: "The checked official Basic Operators page lists `/` as a supported arithmetic operator for building filter conditions on numeric fields."
doc_notes:
  - "The checked official page lists `/` but does not provide a division-specific example."
  - "The checked official page does not define divide-by-zero behavior, integer-versus-floating division semantics, type coercion rules, or mixed-threshold behavior for `/`."

verify_status: edge_validated
observed_summary: "On the local 19532 deployment, safe FLOAT and DOUBLE division probes matched ordinary real-number division, while INT division behaved like truncation toward zero: `101 / 2 == 50`, `101 / 2 > 50` was false, and `-3 / 2 == -1`. An INT division expression compared against a float threshold (`c_int / 2 > 50.4`) was rejected by the parser with an Int64 cast error. Division-by-zero was not executed on the shared server because a historical local case indicates crash risk."
oracle_support:
  - pandas
  - pqs
case_refs:
  - issue47285
repro_path: /home/caihao/compare_test/operator_test/milvus/divide_operator.py

oracle_mapping: "The pandas oracle models `field / const` only for the locally validated subset: non-null numeric rows with a non-zero positive integer constant divisor, using ordinary real division for FLOAT/DOUBLE and truncation-toward-zero integer division for INT fields. INT division against float thresholds and zero-divisor cases are intentionally excluded from the current fuzzer model. This is our oracle assumption, not an official claim."
