doc_supported_types:
  - unknown
doc_semantics: "IN is used to match values within a specific set or range."
doc_notes:
  - "The checked official page lists IN under range operators and gives the example color in [\"red\", \"green\", \"blue\"]."
  - "The checked official page does not explicitly specify supported data types, NULL behavior, missing-key behavior, or mixed-type list semantics for IN."

verify_status: mismatch_observed
observed_summary: "Current local validation matched expected behavior for guarded scalar VARCHAR, INT, and BOOL membership, as well as JSON-path string and numeric membership, including filtering of a missing JSON key and a null JSON field in the sampled cases. However, meta[\"num\"] in [9223372036854775807, 1.5] returned [2] instead of [], reproducing the local mixed int64/float membership mismatch captured by issue48442."
oracle_support:
  - pandas
  - pqs
case_refs:
  - issue48442
repro_path: "/home/caihao/compare_test/operator_test/milvus/in_operator.py"

oracle_mapping: "Current fuzzer maps scalar BOOL/INT/VARCHAR in to pandas membership with an explicit is not null guard, and maps JSON-path in to membership over extracted scalar values, treating a null JSON field as UNKNOWN and a missing path inside a non-null JSON object as FALSE. PQS generates true IN predicates for BOOL/INT/VARCHAR and JSON scalar bool/int/string paths using same-type candidate lists that include the pivot value, while mixed-type membership lists are outside the current fuzzer generation path; this is our oracle assumption, not an official claim."
