  - pandas
  - pqs
case_refs: []
repro_path: "/home/caihao/compare_test/operator_test/milvus/json_contains_all_operator.py"

oracle_mapping: "Current main pandas oracle maps json_contains_all over JSON-array paths to `all(item in path_val for item in target_items)` on normalized JSON list values, returning UNKNOWN for a null or omitted JSON field and FALSE for a missing path, an explicit null at the target path inside a non-null JSON object, or a non-array path; PQS uses the same normalized candidate builder. The current sound subset covers target item lists made of JSON-serializable scalars or list members built from such scalars, while dict-valued array members remain outside the modeled subset; this is our oracle assumption, not an official claim."
