doc_semantics: "json_contains_all checks whether all specified items are present in the JSON array at the target path."
doc_notes:
  - "The checked official JSON pages explicitly document json_contains_all for JSON fields."
  - "The checked official pages do not clearly specify missing-key behavior, NULL behavior, non-array-path behavior, duplicate-item behavior, or truth-table behavior under boolean composition."

verify_status: edge_validated
observed_summary: "Local validation matched all-members containment on JSON-array paths in the sampled cases. Missing key, explicit null at the target path inside a non-null JSON object, and non-array target paths were filtered out in direct queries; under raw NOT, rows whose whole JSON field was null or omitted stayed excluded, while missing-key, explicit-null-path, and non-array-path rows were included."
