oracle_mapping: "The pandas oracle models SQL-style 3VL with explicit null masks and guarded predicates: a null whole-field value is treated as UNKNOWN, while JSON-path missing-key and explicit-null cases are tracked separately according to observed engine behavior. Known 3VL-sensitive expressions are not promoted into the main random-positive pool; they remain isolated probes for classification."
