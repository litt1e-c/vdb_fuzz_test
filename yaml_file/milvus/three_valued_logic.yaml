doc_semantics: "The documentation describes boolean and comparison expressions, but does not provide a complete formal specification for NULL/UNKNOWN propagation or for missing-key behavior on JSON-path comparisons."
doc_notes:
  - "This entry separates normative checks from known-bug probes: normative checks must pass, while bug probes are used to track whether specific historical behaviors are still reproduced."
verify_status: mismatch_observed
observed_summary: "On the local 2.6.14 deployment, the normative `is null` / `not (is null)` checks passed, and two previously suspicious boolean probes did not reproduce. However, JSON missing-key inequality still diverged from SQL-style 3VL expectations: `meta[\"color\"] != \"blue\"` returned rows with missing-key or null JSON values instead of filtering them as UNKNOWN."
