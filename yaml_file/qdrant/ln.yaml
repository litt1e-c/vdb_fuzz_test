observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST, gRPC, and Python `:memory:` agreed on the tested subset: finite positive inputs greater than 1 worked, `ln(1)` returned 0, positive inputs smaller than 1 produced finite negative scores, defaults could supply a missing input, zero and negative inputs were rejected, and a query containing one invalid logarithm candidate was rejected as a whole rather than returning only the valid rows."
