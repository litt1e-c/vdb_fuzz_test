oracle_mapping: "`ln` would be mapped to a numeric oracle by evaluating the input expression over the prefetched candidate set, accepting only the currently validated positive finite subset, allowing finite negative output scores when the input is between 0 and 1, comparing finite scores with float tolerance, and rejecting zero, negative, or otherwise non-finite results rather than assigning scores. Current main fuzzer coverage does not implement FormulaQuery or `ln`, so this record documents a validated design target rather than integrated oracle support. This is our oracle assumption, not an official claim."
