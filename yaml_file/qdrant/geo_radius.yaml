operator_id: geo_radius
family: other
syntax_examples:
- '{"key":"location","geo_radius":{"center":{"lat":52.5200,"lon":13.4050},"radius":1000.0}}'
- '{"must":[{"key":"location","geo_radius":{"center":{"lat":0.0,"lon":0.0},"radius":1000.0}}]}'
- '{"key":"locations","geo_radius":{"center":{"lat":0.0,"lon":0.0},"radius":200000.0}}'
doc_status: operator_documented
doc_source_urls:
- https://qdrant.tech/documentation/concepts/filtering/
- https://qdrant.tech/documentation/concepts/payload/
doc_supported_types:
- json_field
doc_semantics: '`geo_radius` matches geo payload values inside a circle defined by a center `GeoPoint` and a radius in meters; geo payload objects use `lat` and `lon`, and array payloads satisfy a filter if at least one stored value meets the condition.'
doc_notes:
- The checked docs do not clearly specify boundary inclusion, numeric tolerance, or the exact earth-distance model used for radius comparisons.
- The checked payload docs state that a filter is not satisfied when the stored value type does not fit the filtering condition.
- A local historical case exists for geo bounding-box boundary behavior, but it is secondary evidence for the geo family and not official `geo_radius` semantics.
verify_status: edge_validated
observed_summary: 'On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST and gRPC matched the tested geo-radius subset: an inside point matched, a point constructed exactly at the 1000m haversine boundary and a zero-radius exact-center query did not match, a 1000.5m point did not match, geo arrays matched when one element was inside, and missing/null plus the tested non-geo string row were excluded.'
oracle_support:
- pqs
- pandas
case_refs:
- poc_qdrant_issue8539_geo_bounding_box_boundary
repro_path: ~/compare_test/operator_test/qdrant/geo_radius_operator.py
oracle_mapping: '`geo_radius` is mapped to pandas/PQS by computing haversine distance in meters from the query center and treating scalar geo rows as matches only when distance is strictly less than the radius; missing/null and tested non-geo rows are non-matches, and current main fuzzer coverage is limited to scalar geo payloads while geo-array any-element behavior is locally validated but not yet generated. This is our oracle assumption, not an official claim.'
