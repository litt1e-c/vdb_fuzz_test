doc_semantics: "The checked official search-relevance page lists `sum` as an arithmetic expression that sums an array of expressions within FormulaQuery-based rescoring."
doc_notes:
  - "The checked concept page does not clearly specify floating-point accumulation order, cancellation behavior, or overflow/non-finite score handling."
  - "The checked concept page is internally ambiguous about missing variables: one sentence says an absent variable without an explicit default uses `0.0`, while the considerations section says a missing score or variable without a default returns an error."
  - "The checked official page documents formula expressions as part of the Query API relevance pipeline rather than payload filtering."

verify_status: edge_validated
observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.16.1, REST, gRPC, and Python `:memory:` agreed on the tested subset: ordinary summation worked, negative terms could produce zero or negative totals, defaults could supply a missing term, missing terms without defaults were rejected, a query containing one overflowing sum was rejected as a whole, and floating-point accumulation order mattered in the tested constant examples because `[1e20, 1.0, -1e20]` evaluated to 0 while `[1e20, -1e20, 1.0]` evaluated to 1."
