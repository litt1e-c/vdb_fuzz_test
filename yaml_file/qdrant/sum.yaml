oracle_mapping: "`sum` would be mapped to a numeric oracle by evaluating terms left-to-right over the prefetched candidate set, comparing finite scores with float tolerance, rejecting missing terms without defaults and overflowing/non-finite totals, and preserving the currently validated order-sensitive floating-point accumulation behavior; current main fuzzer coverage does not implement FormulaQuery or `sum`, so this record documents a validated design target rather than integrated oracle support. This is our oracle assumption, not an official claim."
