oracle_mapping: "`exp` would be mapped to a numeric oracle by evaluating the input expression over the prefetched candidate set, accepting the currently validated finite subset including negative inputs and zero, allowing very negative inputs to underflow to 0, comparing finite scores with float tolerance, and rejecting overflowing or otherwise non-finite results rather than assigning scores; current main fuzzer coverage does not implement FormulaQuery or `exp`, so this record documents a validated design target rather than integrated oracle support. This is our oracle assumption, not an official claim."
