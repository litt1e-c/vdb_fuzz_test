  - "The checked concept page is internally ambiguous about missing variables: one sentence says an absent variable without an explicit default uses `0.0`, while the considerations section says a missing score or variable without a default returns an error."
  - "The checked official page documents formula expressions as part of the Query API relevance pipeline rather than payload filtering."

verify_status: edge_validated
observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.16.1, REST, gRPC, and Python `:memory:` agreed on the tested subset: finite positive inputs worked, `exp(0)` returned 1, finite negative inputs produced finite positive scores, very negative inputs such as -1000 underflowed to 0 without an error, defaults could supply a missing input, missing inputs without defaults were rejected, and a query containing one overflowing exponential candidate was rejected as a whole rather than returning only the finite rows."
