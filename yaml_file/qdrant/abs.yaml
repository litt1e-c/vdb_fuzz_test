oracle_mapping: '`abs` would be mapped to a numeric oracle by evaluating the input expression over the prefetched candidate set, applying absolute value, comparing finite scores with float tolerance, and rejecting missing inputs without defaults or overflowing/non-finite results rather than assigning scores; current main fuzzer coverage does not implement FormulaQuery or `abs`, so this record documents a validated design target rather than integrated oracle support. This is our oracle assumption, not an official claim.'
