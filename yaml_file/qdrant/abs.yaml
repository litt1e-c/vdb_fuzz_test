doc_semantics: The checked official search-relevance page lists `abs` as an arithmetic expression that computes the absolute value of an expression within FormulaQuery-based rescoring.
doc_notes:
- The checked concept page does not clearly specify overflow handling or output precision.
- 'The checked concept page is internally ambiguous about missing variables: one sentence says an absent variable without an explicit default uses `0.0`, while the considerations section says a missing score or variable without a default returns an error.'
- The checked official page documents formula expressions as part of the Query API relevance pipeline rather than payload filtering.
verify_status: edge_validated
observed_summary: 'On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST, gRPC, and Python `:memory:` agreed on the tested subset: absolute value returned non-negative magnitudes, `abs(0)` returned 0, defaults could supply a missing input, missing inputs without defaults were rejected, and a query containing one overflowing absolute-value candidate was rejected as a whole rather than returning only the finite rows.'
