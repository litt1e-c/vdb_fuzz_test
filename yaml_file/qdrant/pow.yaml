doc_semantics: "The checked official search-relevance page lists `pow` as an arithmetic expression that raises one expression to the power of another within FormulaQuery-based rescoring."
doc_notes:
  - "The checked concept page does not clearly specify `0^0`, negative-base domain rules, zero-to-negative-exponent behavior, overflow/non-finite score handling, or output precision."
  - "The checked concept page is internally ambiguous about missing variables: one sentence says an absent variable without an explicit default uses `0.0`, while the considerations section says a missing score or variable without a default returns an error."
  - "The checked official page documents formula expressions as part of the Query API relevance pipeline rather than payload filtering."

verify_status: edge_validated
observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST, gRPC, and Python `:memory:` agreed on the tested subset: finite positive-base squaring worked, `0^0` returned 1, negative bases with integer exponents worked, defaults could supply a missing exponent, negative bases with fractional exponents were rejected, `0^-1` was rejected, and a query containing one overflowing rescored candidate was rejected as a whole rather than returning only the finite rows. Python `:memory:` differed only in using a raw `math domain error` message for the tested `0^-1` case."
