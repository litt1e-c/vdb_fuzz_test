oracle_mapping: "`pow` would be mapped to a numeric oracle by evaluating base and exponent over the prefetched candidate set, allowing non-negative bases and non-zero negative bases with integer exponents in the currently validated subset, treating `0^0` as 1, and rejecting domain-error or non-finite results rather than assigning scores. Current main fuzzer coverage does not implement FormulaQuery or `pow`, so this record documents a validated design target rather than integrated oracle support. This is our oracle assumption, not an official claim."
