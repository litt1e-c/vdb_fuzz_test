operator_id: nested
family: json_special
syntax_examples:
- '{"nested":{"key":"diet","filter":{"must":[{"key":"food","match":{"value":"meat"}},{"key":"likes","match":{"value":true}}]}}}'
- '{"nested":{"key":"items","filter":{"should":[{"key":"score","match":{"value":5}},{"key":"score","match":{"value":9}}]}}}'
- '{"nested":{"key":"items","filter":{"must_not":[{"key":"active","match":{"value":false}}]}}}'
doc_status: operator_documented
doc_source_urls:
- https://qdrant.tech/documentation/concepts/filtering/
doc_supported_types:
- json_field
- array_field
doc_semantics: '`nested` applies the inner filter to each object in an array and matches the parent point if at least one nested object satisfies that inner filter; it is the documented way to enforce same-element semantics for arrays of objects.'
doc_notes:
- The checked docs distinguish `nested` same-element filtering from plain projected key-path matching over arrays of objects.
- The checked docs say `has_id` is not supported inside nested.
verify_status: mismatch_observed
observed_summary: On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST and gRPC matched same-element semantics for nested with inner must/should/min_should/must_not, clearly differed from projected `items[].field` semantics by rejecting a cross-element score+label conjunction that the projected form accepted, excluded missing/null/[] parent fields from ordinary nested predicates, and respected top-level must_not wrapped around a nested+min_should formula; however, inner `has_id` was accepted and returned an empty result on both transports instead of being rejected as the checked docs state.
oracle_support:
- pandas
- pqs
case_refs: []
repro_path: ~/compare_test/operator_test/qdrant/nested_operator.py
oracle_mapping: '`nested` is mapped to pandas/PQS by iterating the array-of-object field and evaluating the inner filter against each element, with the parent row matching iff at least one element satisfies that inner filter; missing/null/[] parent fields are treated as non-matches for ordinary nested predicates, and the validated subset now includes the documented same-element contrast against projected `items[].field` filtering, plus inner `must`/`should`/`min_should`/`must_not` over `score`, `label`, and `active`, and top-level `must_not` around nested formulas, without generating `has_id` inside nested. This is our oracle assumption, not an official claim.'
