operator_id: datetime_profile
family: other
syntax_examples:
  - 'create_payload_index("dt_default", DatetimeIndexParams(type=DatetimeIndexType.DATETIME)) + FieldCondition(key="dt_default", range=DatetimeRange(gte="2021-01-10T06:40:10Z", lte="2021-01-10T06:40:10Z"))'
  - 'create_payload_index("dt_on_disk", DatetimeIndexParams(type=DatetimeIndexType.DATETIME, on_disk=True)) + FieldCondition(key="dt_on_disk", range=DatetimeRange(gte="2020-01-01T00:00:00Z"))'
  - 'create_payload_index("dt_principal", DatetimeIndexParams(type=DatetimeIndexType.DATETIME, is_principal=True)) + Filter(must_not=[FieldCondition(key="dt_principal", range=DatetimeRange(gt="2024-01-01T00:00:00Z"))])'

doc_status: family_documented
doc_source_urls:
  - https://qdrant.tech/documentation/concepts/indexing/
  - https://qdrant.tech/documentation/concepts/filtering/
doc_supported_types:
  - scalar_datetime
doc_semantics: "Official Qdrant documentation describes datetime payload indexes and datetime range filtering, including on-disk and principal index options for datetime payload fields."
doc_notes:
  - "This YAML entry groups deterministic cross-profile checks for default, on-disk, principal, and principal-on-disk datetime index configurations."
  - "The goal is to verify that documented datetime filtering semantics stay stable across index profiles, not to claim a new payload filter operator beyond documented datetime indexing knobs."
  - "The local validator also checks `must_not(datetime_range)` behavior on missing, null, and tested type-mismatch rows."

verify_status: edge_validated
observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST and gRPC agreed across the tested default, on-disk, principal, and principal-on-disk datetime index profiles for closed-bound equality, inclusive inequalities, UTC-normalized equivalent instants, and `must_not(datetime_range)` behavior over missing/null and a tested integer type-mismatch row."
oracle_support: []
case_refs: []
repro_path: ~/compare_test/operator_test/qdrant/datetime_profile_operator.py

oracle_mapping: "`datetime_profile` does not use the generic pandas/PQS oracle. It uses a deterministic fixed fixture and explicit expected ID sets to verify that documented datetime range semantics remain stable across datetime index profiles and transports."
