operator_id: nested_key
family: payload_key_path
syntax_examples:
  - '{"key":"country.name","match":{"value":"Germany"}}'
  - '{"key":"country.cities[].population","range":{"gte":9.0}}'
  - '{"key":"country.cities[].sightseeing","match":{"value":"Osaka Castle"}}'

doc_status: family_documented
doc_source_urls:
  - https://qdrant.tech/documentation/concepts/filtering/
doc_supported_types:
  - unknown
doc_semantics: "Dot notation addresses nested object fields, and `[]` projects over nested arrays so a condition matches if any projected value matches the child predicate; same-element semantics for arrays of objects require `nested`, not plain key paths."
doc_notes:
  - "The checked docs show `country.name`, `country.cities[].population`, and `country.cities[].sightseeing` as representative payload-key examples."
  - "The checked docs distinguish plain key-path matching over arrays of objects from `nested` same-element filtering."
  - "The checked docs do not clearly specify numeric index syntax such as `[0]`."

verify_status: edge_validated
observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.16.1, both REST and gRPC matched dot-key access, `[]` projection over arrays of objects, and projected leaf-array matching; missing/null/empty parent paths did not satisfy ordinary nested-key predicates, and plain projected-path conjunctions could match across different elements while same-element semantics required `nested`."
oracle_support:
  - documented dot-key access over validated JSON object paths
  - documented `[]` projection over validated JSON array-of-object paths
  - plain projected-path and `nested` same-element distinction in the validated subset
case_refs: []
