oracle_mapping: "`nested_key` is mapped to pandas/PQS by traversing validated JSON paths with dot notation and by projecting `[]` over array-of-object values so that any projected leaf satisfying the child predicate is a match; missing/null/empty parent paths are treated as non-matches for ordinary predicates, and current fuzzer coverage is the validated subset over `meta_json.country.name`, `meta_json.country.cities[].name`, `meta_json.country.cities[].population`, `meta_json.country.cities[].sightseeing`, and `meta_json.config.version` without upgrading broader generic JSON-path fallbacks into this operator claim. This is our oracle assumption, not an official claim."
