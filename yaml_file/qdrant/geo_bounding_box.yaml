operator_id: geo_bounding_box
family: geo_condition
syntax_examples:
  - '{"key":"location","geo_bounding_box":{"top_left":{"lat":52.5200,"lon":13.4050},"bottom_right":{"lat":52.5100,"lon":13.4200}}}'
  - '{"key":"location_geo","geo_bounding_box":{"top_left":{"lat":90.0,"lon":158.75},"bottom_right":{"lat":69.4,"lon":180.0}}}'
  - '{"must":[{"key":"locations","geo_bounding_box":{"top_left":{"lat":81.0,"lon":169.0},"bottom_right":{"lat":79.0,"lon":171.0}}}]}'

doc_status: operator_documented
doc_source_urls:
  - https://qdrant.tech/documentation/concepts/filtering/
  - https://qdrant.tech/documentation/concepts/payload/
doc_supported_types:
  - geo
doc_semantics: "`geo_bounding_box` matches geo payload values inside a rectangle defined by an upper-left `top_left` point and a lower-right `bottom_right` point."
doc_notes:
  - "The checked docs do not clearly specify exact-boundary inclusion, numeric tolerance, anti-meridian handling, or backend-specific behavior."
  - "The checked payload docs document generic array behavior: if several values are stored, at least one value matching the condition is sufficient."
  - "A local historical case exists for issue 8539, where an exact geo bounding-box boundary point can be handled inconsistently; this is secondary evidence, not official semantics."

verify_status: mismatch_observed
observed_summary: "On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST and gRPC agreed on the tested server subset: a scalar point strictly inside the box matched, all tested exact edge/corner scalar points were excluded, a geo array with a non-boundary inside element matched, and missing/null plus tested non-geo rows were excluded. Python `:memory:` differed by including all tested exact edge/corner scalar points and a boundary-only geo array."
oracle_support:
  - scalar non-boundary geo bounding-box predicates on present geo objects
  - PQS scalar non-boundary geo bounding-box predicates when the generated box is not clamped to a global boundary
  - missing/null and tested non-geo rows treated as non-matches in the validated subset
  - geo-array any-element behavior validated by the operator script but not generated by the main fuzzer
case_refs:
  - poc_qdrant_issue8539_geo_bounding_box_boundary
repro_path: /home/caihao/compare_test/operator_test/qdrant/geo_bounding_box_operator.py

oracle_mapping: "`geo_bounding_box` is mapped to pandas/PQS only for the currently sound scalar non-boundary subset by comparing `bottom_right.lat < lat < top_left.lat` and `top_left.lon < lon < bottom_right.lon`, with missing/null and tested non-geo rows as non-matches; exact boundary/corner cases are excluded from sound oracle claims because REST/gRPC and Python `:memory:` disagree locally, and current main fuzzer coverage is scalar-only and falls back away from globally clamped boxes while geo-array any-element behavior is locally validated but not generated. This is our oracle assumption, not an official claim."
