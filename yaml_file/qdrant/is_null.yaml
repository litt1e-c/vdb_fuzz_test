oracle_mapping: "`is_null` is mapped to pandas by treating a row as null only when the target value itself is explicit null, and as non-null otherwise; `must_not is_null` uses the complement of that mask, current main fuzzer coverage includes top-level scalar/array/ARRAY_OBJECT fields, evolved fields default to `is_empty` semantics unless explicit null backfill is enabled, and broader generic nested-path `is_null` behavior is locally validated but not generally generated. This is our oracle assumption, not an official claim."
