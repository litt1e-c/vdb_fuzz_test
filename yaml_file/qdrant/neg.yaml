doc_semantics: The checked official search-relevance page lists `neg` as an arithmetic expression that negates an expression within FormulaQuery-based rescoring.
doc_notes:
- The checked concept page does not clearly specify signed-zero formatting, overflow handling, or output precision.
- 'The checked concept page is internally ambiguous about missing variables: one sentence says an absent variable without an explicit default uses `0.0`, while the considerations section says a missing score or variable without a default returns an error.'
- The checked official page documents formula expressions as part of the Query API relevance pipeline rather than payload filtering.
verify_status: edge_validated
observed_summary: 'On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST, gRPC, and Python `:memory:` agreed on the tested subset: unary negation flipped sign, negating zero was semantically zero, defaults could supply a missing input, missing inputs without defaults were rejected, and a query containing one overflowing negated candidate was rejected as a whole rather than returning only the finite rows. REST and Python `:memory:` sometimes rendered zero as `-0.0`, while gRPC rendered `0.0`.'
