oracle_mapping: "`div` would be mapped to a numeric oracle by evaluating left and right expressions over the prefetched candidate set, short-circuiting when the left side is exactly 0, rejecting non-finite results unless an explicit zero-divisor fallback is configured, and comparing scores with float tolerance rather than exact equality; current main fuzzer coverage does not implement FormulaQuery or `div`, so this record documents a validated design target rather than integrated oracle support. This is our oracle assumption, not an official claim."
