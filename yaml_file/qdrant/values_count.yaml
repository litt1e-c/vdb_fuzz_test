operator_id: values_count
family: array_special
syntax_examples:
- '{"key":"comments","values_count":{"gt":2}}'
- '{"key":"tags","values_count":{"lte":0}}'
- '{"key":"items","values_count":{"gte":1}}'
doc_status: operator_documented
doc_source_urls:
- https://qdrant.tech/documentation/concepts/filtering/
- https://qdrant.tech/documentation/concepts/payload/
doc_supported_types:
- array_field
- unknown
doc_semantics: '`values_count` filters by the number of stored values at a payload key using `gt`, `gte`, `lt`, and `lte`; the checked docs show array-length filtering and state that if the stored value is not an array, the amount of values is assumed to be 1.'
doc_notes:
- The checked docs do not clearly specify missing-key behavior, explicit null handling, empty-array handling, or how arrays containing null elements are counted.
- The checked docs do not separately document object payloads for `values_count`, even though they fall under the documented non-array rule.
verify_status: mismatch_observed
observed_summary: 'On local Qdrant v1.17.0 with qdrant-client v1.17.0, REST and gRPC matched each other on the tested subset: missing keys did not satisfy the tested predicates, explicit null and [] behaved like count 0, present non-array string and dict values behaved like count 1, [None] behaved like count 1, and a two-element array of objects behaved like count 2. Python `:memory:` matched most tested cases but counted the tested scalar dict as 2 instead of 1, so `gt=1`/`gte=2` differed from the server in that backend-sensitive case.'
oracle_support:
- pandas
case_refs: []
repro_path: ~/compare_test/operator_test/qdrant/values_count_operator.py
oracle_mapping: '`values_count` is mapped to pandas by deriving a count and comparing it with the requested bound: lists use `len(list)`, explicit null uses 0, and present non-list values use 1; current main fuzzer coverage avoids evolved fields, missing-key semantics are not relied on, and implementation coverage is limited to generated `ARRAY_INT`/`ARRAY_STR`/`ARRAY_FLOAT` fields while scalar non-array and `ARRAY_OBJECT` behavior are locally validated but not yet generated. This is our oracle assumption, not an official claim.'
