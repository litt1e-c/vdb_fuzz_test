version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: qdrant-1.16.3
    restart: unless-stopped

    ports:
      - "6333:6333"   # HTTP REST API
      - "6334:6334"   # gRPC API

    environment:
      # Enable gRPC explicitly
      QDRANT__SERVICE__GRPC_PORT: 6334

      # Optional: limit log level
      QDRANT__LOG_LEVEL: INFO

    volumes:
      # Persistent storage
      - ./qdrant_data:/qdrant/storage

    networks:
      - qdrant_net


networks:
  qdrant_net:
    driver: bridge
